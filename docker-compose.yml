services:
  db:
    image: pgvector/pgvector:pg16
    container_name: tca_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: telegram_ai_agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d telegram_ai_agent"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - db_net

  redis:
    image: redis:alpine
    container_name: tca_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - redis_net

  api:
    build: .
    container_name: tca_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/telegram_ai_agent
      REDIS_URL: redis://redis:6379/0
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1', 8000), timeout=2); s.close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - edge
      - db_net
      - redis_net

  dashboard:
    build: .
    container_name: tca_dashboard
    command: streamlit run app/dashboard/admin_panel.py --server.port 8501 --server.address 0.0.0.0
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://user:password@db:5432/telegram_ai_agent
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8501:8501"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.create_connection(('127.0.0.1', 8501), timeout=2); s.close()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - edge
      - db_net

volumes:
  postgres_data:

networks:
  edge:
    driver: bridge
  db_net:
    driver: bridge
    internal: true
  redis_net:
    driver: bridge
    internal: true
